<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>8 Shift Daily Tracker</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<header>
  <h2>📊 8 Shift Daily Tracker</h2>
</header>

<div class="container">

<div class="grid">

  <div class="shift"><h3>M1</h3><div id="m1"></div><button onclick="add('m1')">+ Add</button></div>
  <div class="shift"><h3>M2</h3><div id="m2"></div><button onclick="add('m2')">+ Add</button></div>

  <div class="shift"><h3>E1</h3><div id="e1"></div><button onclick="add('e1')">+ Add</button></div>
  <div class="shift"><h3>E2</h3><div id="e2"></div><button onclick="add('e2')">+ Add</button></div>

  <div class="shift"><h3>N1</h3><div id="n1"></div><button onclick="add('n1')">+ Add</button></div>
  <div class="shift"><h3>N2</h3><div id="n2"></div><button onclick="add('n2')">+ Add</button></div>

  <div class="shift"><h3>OFF</h3><div id="off"></div><button onclick="add('off')">+ Add</button></div>
  <div class="shift"><h3>GENERAL</h3><div id="g"></div><button onclick="add('g')">+ Add</button></div>

</div>

<div class="chart-box">
<canvas id="chart"></canvas>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
